services:
  postgres:
    ports: !reset []
    restart: unless-stopped

  redis:
    restart: unless-stopped

  backend:
    volumes: !reset []
    restart: unless-stopped
    ports: !reset []
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1/up || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  queue:
    command: php artisan horizon
    volumes: !reset []
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api/v1
    volumes: !reset []
    restart: unless-stopped
    ports: !reset []

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '3001:3001'
    environment:
      BASIC_AUTH_USER: ${BASIC_AUTH_USER}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH}
      GRAFANA_BASIC_AUTH_USER: ${GRAFANA_BASIC_AUTH_USER}
      GRAFANA_BASIC_AUTH_HASH: ${GRAFANA_BASIC_AUTH_HASH}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
      grafana:
        condition: service_started
    networks:
      - internal

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./deploy/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - internal

  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    volumes:
      - ./deploy/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - internal

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
      GF_ALERTING_ENABLED: 'true'
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - internal

volumes:
  caddy_data:
  caddy_config:
  loki_data:
  grafana_data:
